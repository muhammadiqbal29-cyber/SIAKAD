name: CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]


jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy variables specifically for passing Next.js build-time checks and Prisma config
      DATABASE_URL: "postgresql://postgres:dummy@localhost:5432/dummy"
      DIRECT_URL: "postgresql://postgres:dummy@localhost:5432/dummy"
      NEXTAUTH_SECRET: "ci_dummy_secret_do_not_use_in_prod"
      NEXTAUTH_URL: "http://localhost:3000"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Build Next.js Application
      run: npm run build
